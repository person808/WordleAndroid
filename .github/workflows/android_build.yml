name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with: {distribution: 'temurin', java-version: '17'}
      - uses: gradle/actions/setup-gradle@v5
      - run: chmod +x gradlew
      - run: ./gradlew unitTestDebugCoverageReport
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.7.1
        if: github.event_name == 'pull_request'
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/unitTestDebugCoverageReport/unitTestDebugCoverageReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 40
          min-coverage-changed-files: 60
      - run: ./gradlew assembleDebug
      - run: ./gradlew assembleRelease
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: app/build/reports/jacoco/unitTestDebugCoverageReport/html
      - uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
      - uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk